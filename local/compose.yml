name: concourse-local

services:
  db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: concourse
      POSTGRES_USER: concourse_user
      POSTGRES_PASSWORD: concourse_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concourse_user -d concourse"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: docker.io/concourse/concourse:8
    platform: linux/arm64
    command: web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./keys/web:/concourse-keys:ro,z
    environment:
      CONCOURSE_POSTGRES_HOST: db
      CONCOURSE_POSTGRES_USER: concourse_user
      CONCOURSE_POSTGRES_PASSWORD: concourse_pass
      CONCOURSE_POSTGRES_DATABASE: concourse
      CONCOURSE_EXTERNAL_URL: http://localhost:8080
      CONCOURSE_ADD_LOCAL_USER: admin:admin
      CONCOURSE_MAIN_TEAM_LOCAL_USER: admin
      CONCOURSE_CLUSTER_NAME: local-dev

  worker:
    image: docker.io/concourse/concourse:8
    platform: linux/arm64
    command: worker
    privileged: true
    depends_on:
      - web
    volumes:
      - ./keys/worker:/concourse-keys:ro,z
      - worker_data:/concourse-work-dir
    environment:
      CONCOURSE_TSA_HOST: web:2222
      CONCOURSE_WORK_DIR: /concourse-work-dir
      CONCOURSE_BAGGAGECLAIM_DRIVER: overlay

volumes:
  pg_data:
  worker_data:
